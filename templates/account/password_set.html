{% extends "web/app/app_base.html" %}
{% load static %}
{% load i18n %}
{% load account %}
{% load form_tags %}
{% block app %}
<section class="bg-white dark:bg-slate-800 rounded-2xl shadow-premium border border-slate-200/80 dark:border-slate-700 p-8 lg:p-10">
  <h3 class="text-xl mb-1 text-slate-900 dark:text-white">{% translate "Set Password" %}</h3>
  <form method="POST" action="{% url 'account_set_password' %}" class="password_set">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% render_form_fields form %}
    <div class="mt-2">
      <input class="btn btn-primary" type="submit" value="{% translate 'Set Password' %}">
    </div>
  </form>
</section>
{% endblock %}
