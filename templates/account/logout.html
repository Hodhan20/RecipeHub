{% extends "web/app/app_base.html" %}
{% load static %}
{% load i18n %}
{% block app %}
<section class="bg-white dark:bg-slate-800 rounded-2xl shadow-premium border border-slate-200/80 dark:border-slate-700 p-8 lg:p-10">
  <h1 class="text-3xl font-bold mb-2 text-slate-900 dark:text-white">Sign out</h1>
  <p class="text-xl mb-1 text-slate-600 dark:text-slate-300">{% translate 'Are you sure you want to sign out?' %}</p>
  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    {% if redirect_field_value %}
    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
    {% endif %}
    <div class="field is-grouped">
      <div class="control">
        <input class="btn btn-primary" type="submit" value="{% translate 'Sign Out' %}">
        <a class="btn btn-outline" href="{% url 'web:home' %}">
          <span class="w-6 h-6 inline-flex justify-center items-center">
            <i class="fa fa-home"></i>
          </span>
          <span class="text-slate-700 dark:text-slate-200">{% translate "Home" %}</span>
        </a>
      </div>
    </div>
  </form>
</section>
{% endblock %}
