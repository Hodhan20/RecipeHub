{% extends "web/base.html" %}

{% block body %}
<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-premium border border-slate-200/80 dark:border-slate-700 p-10 text-center">
      <div class="w-16 h-16 bg-red-50 dark:bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.061-.94-1.75-1.975-1.75H15.75M15.75 0H5.25A2.25 2.25 0 003 2.25v.916c0 .66.304 1.26.836 1.642l7.125 5.25a2.25 2.25 0 002.244 0l7.125-5.25A2.252 2.252 0 0021 3.166V2.25A2.25 2.25 0 0018.75 0z" /></svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">Delete Recipe</h1>
      <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">Are you sure you want to delete <strong class="text-slate-800 dark:text-slate-100 font-semibold">{{ recipe.title }}</strong>? This action cannot be undone.</p>

      <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div class="flex gap-3 justify-center">
          <button type="submit" class="btn btn-error btn-lg shadow-md hover:shadow-lg">Yes, Delete</button>
          <a href="{% url 'recipes:recipe_detail' recipe.id %}" class="btn btn-ghost btn-lg text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
